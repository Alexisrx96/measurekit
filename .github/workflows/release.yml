# Release pipeline: push a tag `vX.Y.Z` to publish physure to PyPI.
#
# physure-core is a pure-Rust rlib with no PyO3 bindings — it's statically
# linked into physure-python's compiled extension and is not an independently
# installable Python package, so it is not published here.
#
# One-time setup (repo owner):
#   1. PyPI: add a Trusted Publisher to the physure project: repo
#      Alexisrx96/physure, workflow release.yml, environment pypi.
#   2. GitHub: create the `pypi` environment (Settings -> Environments).
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Tag must match physure.__version__
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(grep -Po '(?<=__version__ = ")[^"]*' physure-python/physure/__init__.py)"
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match __version__ $version" >&2
            exit 1
          fi

  physure-dist:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
      - run: uv build --out-dir dist
        working-directory: physure-python
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: physure-dist
          path: physure-python/dist

  publish:
    needs: [physure-dist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: physure-dist
          path: dist-py
      - name: Publish physure
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist-py
          skip-existing: true
