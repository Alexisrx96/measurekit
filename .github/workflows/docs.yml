name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          
      - name: Set up Python
        run: uv python install 3.12
        
      - name: Install dependencies
        run: uv sync --all-extras
        
      - name: Execute Tutorial Notebooks
        run: |
          # Use nbmake to verify notebooks execute without errors
          uv run pytest --nbmake docs/tutorials/*.ipynb
          
      - name: Build Documentation and Check Links
        run: |
          # Build with --strict to catch warnings as errors (including broken links)
          uv run mkdocs build --strict
