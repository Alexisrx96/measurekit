# Manually-triggered version bump for physure-core: bumps the workspace
# version in Cargo.toml, commits, tags `core-vX.Y.Z`, and pushes. The tag
# push then triggers core-release.yml, which publishes to crates.io.
#
# The physure Python wrapper has its own independent version and release
# flow — see bump-release.yml / release.yml (tags `vX.Y.Z`).
name: Bump and Release Core

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "physure-core version part to bump"
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Bump physure-core version
        id: bump
        run: |
          current="$(grep -Po '(?<=^version     = ")[^"]*' Cargo.toml)"
          IFS=. read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="$major.$minor.$patch"
          sed -i "s/^version     = \"$current\"/version     = \"$new\"/" Cargo.toml
          echo "new=$new" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: release core-v${{ steps.bump.outputs.new }}"
          git tag "core-v${{ steps.bump.outputs.new }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "core-v${{ steps.bump.outputs.new }}"
